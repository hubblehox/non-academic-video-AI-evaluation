<!DOCTYPE html>
<html>
<head>
    <title>Submit Data</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }
        .container {
            width: 50%;
            margin: 50px auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        input[type="submit"] {
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background-color: #45a049;
        }
        label {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Submit Data to FastAPI</h2>
        <form method="POST">
            <label for="VideoPath">Video Path:</label>
            <input type="text" id="VideoPath" name="VideoPath" required>

            <label for="subject">Subject:</label>
            <input type="text" id="subject" name="subject" required>

            <label for="role">Role:</label>
            <input type="text" id="role" name="role" required>

            <label for="RefImage">Ref Image:</label>
            <input type="text" id="RefImage" name="RefImage" required>

            <input type="submit" value="Submit">
        </form>
    </div>
</body>
</html>
